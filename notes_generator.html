<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Рукописных Конспектов</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .input-section, .preview-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }

        .preview-section {
            animation-delay: 0.2s;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .preview-canvas {
            width: 100%;
            max-height: 600px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-style: italic;
            min-height: 400px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-top: 15px;
        }

        .success {
            background: #efe;
            color: #3a3;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3a3;
            margin-top: 15px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .char-count {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .notes-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .download-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .format-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function NotesGenerator() {
            const [inputText, setInputText] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [notesData, setNotesData] = useState(null);
            const canvasRef = useRef(null);

            const charCount = inputText.length;
            const wordCount = inputText.trim().split(/\s+/).filter(w => w.length > 0).length;

            const generateNotes = async () => {
                if (!inputText.trim()) {
                    setError('Пожалуйста, введите текст');
                    return;
                }

                setLoading(true);
                setError('');
                setSuccess('');

                try {
                    // Отправляем текст на Claude API для обработки
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "x-api-key": "sk-ant-..." // Будет вставлена системой
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1000,
                            system: `Ты специалист по созданию структурированных конспектов для рукописных заметок.
                            
ТВОЯ ЗАДАЧА:
1. Анализировать входящий текст
2. Выделить главные разделы
3. Выделить ключевые термины (для желтого маркера)
4. Найти важные даты/цифры (для красных кружков)
5. Создать структурированный JSON для визуализации

ОТВЕТ ТОЛЬКО В JSON, БЕЗ ТЕКСТА! Формат:
{
  "title": "Главный заголовок",
  "subtitle": "Подзаголовок",
  "sections": [
    {
      "title": "Название раздела",
      "items": [
        {
          "text": "Текст",
          "highlights": ["слово1", "слово2"],
          "redCircles": ["дата1", "цифра1"]
        }
      ]
    }
  ],
  "formula": "Важная формула или расчет",
  "keyPoints": ["Точка 1", "Точка 2"]
}`,
                            messages: [
                                {
                                    role: "user",
                                    content: `Создай структурированный конспект из этого текста:\n\n${inputText}`
                                }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Ошибка API');
                    }

                    const data = await response.json();
                    let jsonText = data.content[0].text;
                    
                    // Очищаем от markdown-кода если есть
                    jsonText = jsonText.replace(/```json\n?|\n?```/g, '').trim();
                    
                    const parsed = JSON.parse(jsonText);
                    setNotesData(parsed);
                    setSuccess('✅ Конспект готов! Он отрисован ниже.');
                    
                } catch (err) {
                    setError(`Ошибка обработки: ${err.message}`);
                    console.error(err);
                }

                setLoading(false);
            };

            // Рисуем конспект на canvas
            useEffect(() => {
                if (!notesData || !canvasRef.current) return;

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // Устанавливаем размер (A4 пропорции)
                canvas.width = 800;
                canvas.height = 1131;

                // Фон
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Линованная бумага
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                const lineSpacing = 35;
                for (let y = 80; y < canvas.height; y += lineSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(60, y);
                    ctx.lineTo(canvas.width - 30, y);
                    ctx.stroke();
                }

                // Красная линия слева
                ctx.strokeStyle = '#ff9999';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(50, 80);
                ctx.lineTo(50, canvas.height - 50);
                ctx.stroke();

                let y = 60;

                // Заголовок
                ctx.font = 'bold 28px "Segoe Print", cursive';
                ctx.fillStyle = '#1a3a52';
                ctx.fillText(notesData.title || 'Конспект', 80, y);
                y += 40;

                if (notesData.subtitle) {
                    ctx.font = 'italic 14px "Segoe Print", cursive';
                    ctx.fillStyle = '#666';
                    ctx.fillText(notesData.subtitle, 80, y);
                    y += 35;
                }

                y += 20;

                // Секции
                notesData.sections?.forEach((section, idx) => {
                    // Заголовок раздела
                    ctx.font = 'bold 18px "Segoe Print", cursive';
                    ctx.fillStyle = '#d32f2f';
                    ctx.fillText(section.title, 80, y);
                    y += 35;

                    // Элементы
                    section.items?.forEach(item => {
                        ctx.font = '14px "Segoe Print", cursive';
                        ctx.fillStyle = '#333';

                        const words = item.text.split(' ');
                        let lineText = '';
                        let lineY = y;

                        words.forEach(word => {
                            const testText = lineText + (lineText ? ' ' : '') + word;
                            const metrics = ctx.measureText(testText);

                            if (metrics.width > 650) {
                                ctx.fillText(lineText, 100, lineY);
                                lineText = word;
                                lineY += 25;
                            } else {
                                lineText = testText;
                            }

                            // Выделяем ключевые слова желтым
                            if (item.highlights?.some(h => word.includes(h))) {
                                const wordStart = lineText.lastIndexOf(word);
                                ctx.fillStyle = '#ffff00';
                                const wordMetrics = ctx.measureText(word);
                                ctx.fillRect(
                                    100 + ctx.measureText(lineText.substring(0, wordStart)).width - 3,
                                    lineY - 18,
                                    wordMetrics.width + 6,
                                    20
                                );
                                ctx.fillStyle = '#333';
                            }
                        });

                        if (lineText) {
                            ctx.fillText(lineText, 100, lineY);
                            y = lineY + 25;
                        } else {
                            y = lineY;
                        }
                    });

                    y += 15;
                });

                // Формула
                if (notesData.formula) {
                    y += 10;
                    ctx.fillStyle = '#fff8e1';
                    ctx.fillRect(70, y - 5, 700, 35);
                    ctx.strokeStyle = '#ff9800';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(70, y - 5, 700, 35);

                    ctx.font = 'bold 14px "Segoe Print", cursive';
                    ctx.fillStyle = '#ff6f00';
                    ctx.fillText(notesData.formula, 85, y + 20);
                    y += 50;
                }

            }, [notesData]);

            const downloadCanvas = (format) => {
                if (!canvasRef.current) return;
                const link = document.createElement('a');
                link.href = canvasRef.current.toDataURL('image/png');
                link.download = `notes_${Date.now()}.png`;
                link.click();
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(inputText);
                setSuccess('✅ Текст скопирован в буфер обмена');
                setTimeout(() => setSuccess(''), 2000);
            };

            const clearAll = () => {
                setInputText('');
                setNotesData(null);
                setError('');
                setSuccess('');
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>📝 Генератор Рукописных Конспектов</h1>
                        <p>Превращайте текст в красивые конспекты в стиле школьной тетради</p>
                    </div>

                    <div className="main-grid">
                        {/* Левая колонка - ввод */}
                        <div className="input-section">
                            <div className="section-title">Введите текст</div>

                            <div className="notes-info">
                                💡 Вставьте текст, и AI автоматически создаст структурированный конспект с выделениями и важными датами.
                            </div>

                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                placeholder="Вставьте ваш текст здесь... Например, содержание лекции, статьи или учебного материала."
                            />

                            <div className="char-count">
                                Символов: {charCount} | Слов: {wordCount}
                            </div>

                            <div className="button-group">
                                <button className="btn-primary" onClick={generateNotes} disabled={loading || !inputText.trim()}>
                                    {loading ? (
                                        <>
                                            <span className="spinner"></span>
                                            Генерирую...
                                        </>
                                    ) : (
                                        <>
                                            ✨ Создать конспект
                                        </>
                                    )}
                                </button>
                                <button className="btn-secondary" onClick={clearAll}>🗑️ Очистить</button>
                            </div>

                            {error && <div className="error">⚠️ {error}</div>}
                            {success && <div className="success">{success}</div>}
                        </div>

                        {/* Правая колонка - превью */}
                        <div className="preview-section">
                            <div className="section-title">Превью конспекта</div>

                            <div className="preview-canvas">
                                {loading ? (
                                    <div className="loading">
                                        <div className="spinner"></div>
                                        <p>Обработка текста...</p>
                                    </div>
                                ) : notesData ? (
                                    <canvas ref={canvasRef} style={{ maxWidth: '100%', borderRadius: '8px' }}></canvas>
                                ) : (
                                    <p>Здесь появится ваш конспект</p>
                                )}
                            </div>

                            {notesData && (
                                <div className="download-section">
                                    <div className="section-title">Скачать</div>
                                    <div className="format-buttons">
                                        <button className="btn-primary btn-small" onClick={() => downloadCanvas('png')}>
                                            📥 PNG (для печати)
                                        </button>
                                        <button className="btn-secondary btn-small" onClick={() => downloadCanvas('jpg')}>
                                            📥 JPG
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<NotesGenerator />, document.getElementById('root'));
    </script>
</body>
</html>
